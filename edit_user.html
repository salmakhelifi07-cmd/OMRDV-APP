<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edit User</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0b1220;
    color:white;
    font-family:Arial;
    padding:40px;
}

.card{
    max-width:500px;
    margin:auto;
    background:#111827;
    padding:25px;
    border-radius:15px;
}

input{
    margin-top:10px;
    background:#0f172a !important;
    border:none !important;
    color:white !important;
}
</style>
</head>

<body>

<div class="card">

<h4>👤 Edit User: {{ user }}</h4>

<form method="POST">

<input type="text" name="marque" value="{{ data.marque }}" class="form-control" placeholder="Marque">

<input type="text" name="matricule" value="{{ data.matricule }}" class="form-control" placeholder="Matricule">

<button class="btn btn-success mt-3 w-100">✔ Save Changes</button>

</form>

<br>
<a href="/admin" class="btn btn-secondary w-100">⬅ Back</a>

</div>

</body>
</html>
