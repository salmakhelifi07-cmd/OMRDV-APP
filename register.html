<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register - OMRDV</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    font-family:Arial;
    color:white;
}

.card-box{
    width:450px;
    background:#111827;
    padding:30px;
    border-radius:18px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input{
    margin-top:10px;
    background:#0f172a;
    border:none;
    color:white;
}

input:focus{
    background:#0f172a;
    color:white;
    box-shadow:none;
    border:1px solid #38bdf8;
}
</style>
</head>

<body>

<div class="card-box text-center">

<h3>🚛 Create Account</h3>
<p class="text-secondary">Register to access reservation system</p>

<form method="POST">

<input name="username" class="form-control" placeholder="Username" required>

<input name="password" type="password" class="form-control" placeholder="Password" required>

<input name="marque" class="form-control" placeholder="Truck Brand (Marque)" required>

<input name="matricule" class="form-control" placeholder="Truck Plate (Matricule)" required>

<button class="btn btn-success w-100 mt-4">Create Account</button>

</form>

<p class="mt-3">
<a href="/" class="text-info">← Back to login</a>
</p>

</div>

</body>
</html>
