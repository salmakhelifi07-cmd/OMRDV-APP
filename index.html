<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OMRDV SYSTEM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    font-family:Arial;
}

.box{
    width:420px;
    background:#111827;
    padding:30px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input,select{
    margin-top:10px;
    background:#0f172a !important;
    border:none !important;
    color:white !important;
}

a{
    color:#38bdf8;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<h3>🚛 OMRDV SYSTEM</h3>

<p>Choisir votre rôle</p>

<!-- ROLE SELECT -->
<select class="form-control" id="role" onchange="showForm()">
    <option value="">-- Select role --</option>
    <option value="user">👤 User</option>
    <option value="admin">👨‍💼 Admin</option>
    <option value="manager">🧑‍💼 Manager</option>
</select>

<!-- ================= USER ================= -->
<div id="userForm" style="display:none;">
    <form method="POST" action="/login">

        <input name="username" class="form-control" placeholder="Username" required>
        <input type="password" name="password" class="form-control" placeholder="Password" required>

        <button class="btn btn-primary w-100 mt-3">Login User</button>
    </form>

    <p class="mt-2">
        <a href="/register">Create account</a>
    </p>
</div>

<!-- ================= ADMIN ================= -->
<div id="adminForm" style="display:none;">
    <form method="POST" action="/login">

        <input name="username" value="admin" readonly class="form-control">
        <input type="password" name="password" class="form-control" placeholder="Admin password" required>

        <button class="btn btn-warning w-100 mt-3">Login Admin</button>
    </form>
</div>

<!-- ================= MANAGER ================= -->
<div id="managerForm" style="display:none;">
    <form method="POST" action="/login">

        <input name="username" value="manager" readonly class="form-control">
        <input type="password" name="password" class="form-control" placeholder="Manager password (OMMP123)" required>

        <button class="btn btn-info w-100 mt-3">Login Manager</button>
    </form>
</div>

</div>

<script>
function showForm(){

    let role = document.getElementById("role").value;

    document.getElementById("userForm").style.display="none";
    document.getElementById("adminForm").style.display="none";
    document.getElementById("managerForm").style.display="none";

    if(role === "user"){
        document.getElementById("userForm").style.display="block";
    }

    if(role === "admin"){
        document.getElementById("adminForm").style.display="block";
    }

    if(role === "manager"){
        document.getElementById("managerForm").style.display="block";
    }
}
</script>

</body>
</html>
