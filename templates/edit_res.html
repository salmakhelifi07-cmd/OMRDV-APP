<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Edit Reservation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#0b1220;
    color:white;
    font-family:Arial;
    padding:40px;
}
.card{
    max-width:500px;
    margin:auto;
    background:#111827;
    padding:25px;
    border-radius:15px;
}
input,select{
    margin-top:10px;
    background:#0f172a !important;
    border:none !important;
    color:white !important;
}
</style>
</head>

<body>

<div class="card">

<h4>✏ Edit Reservation</h4>

<form method="POST">

<input type="date" name="date" value="{{ r.date }}" class="form-control">
<input type="time" name="heure" value="{{ r.heure }}" class="form-control">

<select name="type" class="form-control">
    <option value="chargement" {% if r.type=="chargement" %}selected{% endif %}>Chargement</option>
    <option value="déchargement" {% if r.type=="déchargement" %}selected{% endif %}>Déchargement</option>
</select>

<select name="zone" class="form-control">

    <option value="Zone A - Bord de quai"
        {% if r.zone=="Zone A - Bord de quai" %}selected{% endif %}>
        Zone A - Bord de quai
    </option>

    <option value="Zone B - Stockage"
        {% if r.zone=="Zone B - Stockage" %}selected{% endif %}>
        Zone B - Stockage
    </option>

    <option value="Zone C - Magasin cale"
        {% if r.zone=="Zone C - Magasin cale" %}selected{% endif %}>
        Zone C - Magasin cale
    </option>

</select>

<button class="btn btn-success mt-3 w-100">✔ Update</button>

</form>

<br>
<a href="/admin" class="btn btn-secondary w-100">⬅ Back</a>

</div>

</body>
</html>
